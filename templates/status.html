<!DOCTYPE html>
<html>
<head>
  <title>Job Status</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    .status { padding: 12px; background: #f5f5f5; border-radius: 6px; margin-bottom: 20px; }
    a { display: block; padding: 10px; margin: 6px 0; background: #1565c0; color: white; border-radius: 6px; text-decoration: none; }
    a:hover { background: #0d47a1; }
    .back { background: #555; margin-top: 20px; }
  </style>
  {% if status != "Done ✅" and not status.startswith("Error") %}
  <meta http-equiv="refresh" content="4">
  {% endif %}
</head>
<body>
  <h2>🎬 Job Status</h2>
  <div class="status">{{ status }}</div>

  {% if clips %}
  <h4>📥 Download Clips:</h4>
  {% for c in clips %}
  <a href="/download/{{ job_id }}/{{ c }}">{{ c }}</a>
  {% endfor %}
  {% endif %}

  <a href="/" class="back">← New Job</a>
</body>
</html>
